<!DOCTYPE html><html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FR-MIXSER PRO Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="text-white min-h-screen font-sans bg-gradient-to-br from-black via-zinc-900 to-green-950 relative overflow-x-hidden">
  <div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_top_right,_#22c55e,_transparent_40%),radial-gradient(circle_at_bottom_left,_#0ea5e9,_transparent_35%)]"></div>
  <div class="absolute top-10 left-1/2 -translate-x-1/2 text-center z-0 select-none">
    <h1 class="text-6xl md:text-8xl font-extrabold text-green-500 opacity-10 tracking-widest">FR MIXSER PRO</h1>
  </div>
  <div class="relative z-10">
  <div class="max-w-md mx-auto p-4">
    <header class="text-center mb-6">
      <h1 class="text-4xl font-extrabold text-green-400 drop-shadow-lg">FR-MIXSER PRO</h1>
      <p class="text-gray-300 mt-2">Suara Jernih • Full Bass • Mid Detail • Tweeter Tajam</p>
    </header><section class="bg-zinc-900 rounded-2xl p-4 shadow-xl mb-4">
  <h2 class="text-xl font-bold mb-3 text-green-300">Koneksi Audio</h2>
  <div class="grid grid-cols-2 gap-3">
    <button class="bg-green-500 hover:bg-green-400 text-black font-bold py-3 rounded-xl">Bluetooth Audio</button>
    <button class="bg-blue-500 hover:bg-blue-400 text-white font-bold py-3 rounded-xl">USB OTG Input</button>
  </div>
</section>

<section class="bg-zinc-900 rounded-2xl p-4 shadow-xl mb-4 space-y-4">
  <h2 class="text-xl font-bold text-green-300">Equalizer Pro</h2>

  <div>
    <label>BASS</label>
    <input type="range" min="0" max="100" value="85" class="w-full accent-green-400">
  </div>

  <div>
    <label>MID</label>
    <input type="range" min="0" max="100" value="70" class="w-full accent-blue-400">
  </div>

  <div>
    <label>TREBLE</label>
    <input type="range" min="0" max="100" value="65" class="w-full accent-yellow-400">
  </div>

  <div>
    <label>MASTER</label>
    <input type="range" min="0" max="100" value="90" class="w-full accent-red-400">
  </div>
</section>

<section class="bg-zinc-900 rounded-2xl p-4 shadow-xl mb-4">
  <h2 class="text-xl font-bold mb-3 text-green-300">YouTube Mixer Player</h2>
  <input id="youtubeUrl" type="text" placeholder="Tempel link YouTube di sini" class="w-full p-3 rounded-xl bg-black text-white border border-green-500 mb-3">
  <button onclick="loadYouTubeVideo()" class="w-full bg-red-600 hover:bg-red-500 py-3 rounded-xl font-bold mb-3">Putar YouTube</button>
  <div class="aspect-video rounded-xl overflow-hidden bg-black mb-4">
    <iframe id="youtubePlayer" class="w-full h-full" src="" allowfullscreen></iframe>
  </div>
</section>

<section class="bg-zinc-900 rounded-2xl p-4 shadow-xl mb-4">
  <h2 class="text-xl font-bold mb-3 text-green-300">Pemutar Musik Offline</h2>
  <audio controls class="w-full"></audio>
  <input type="file" accept="audio/*" class="mt-3 w-full text-sm text-gray-300">
</section>

<section class="bg-zinc-900 rounded-2xl p-4 shadow-xl mb-4">
  <h2 class="text-xl font-bold mb-3 text-green-300">Mode Suara</h2>
  <div class="grid grid-cols-2 gap-2">
    <button class="bg-gray-800 hover:bg-green-500 py-2 rounded-lg">FULL BASS</button>
    <button class="bg-gray-800 hover:bg-green-500 py-2 rounded-lg">VOCAL JERNIH</button>
    <button class="bg-gray-800 hover:bg-green-500 py-2 rounded-lg">DJ PARTY</button>
    <button class="bg-gray-800 hover:bg-green-500 py-2 rounded-lg">SUPER POWER</button>
  </div>
</section>

<section class="bg-zinc-900 rounded-2xl p-4 shadow-xl mb-4">
  <h2 class="text-xl font-bold mb-3 text-green-300">Efek Audio Pro</h2>
  <div class="grid grid-cols-2 gap-2">
    <button class="bg-purple-600 hover:bg-purple-500 py-2 rounded-lg">BASS BOOST</button>
    <button class="bg-purple-600 hover:bg-purple-500 py-2 rounded-lg">SUPER BASS</button>
    <button class="bg-purple-600 hover:bg-purple-500 py-2 rounded-lg">LIVE CONCERT</button>
    <button class="bg-purple-600 hover:bg-purple-500 py-2 rounded-lg">HOREG MODE</button>
  </div>
</section>

<section class="bg-zinc-900 rounded-2xl p-4 shadow-xl mb-6">
  <h2 class="text-xl font-bold mb-3 text-green-300">Mode Akses</h2>
  <div class="flex gap-3">
    <button class="flex-1 bg-orange-500 hover:bg-orange-400 py-3 rounded-xl font-bold">ONLINE MODE</button>
    <button class="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-xl font-bold">OFFLINE MODE</button>
  </div>
</section>

<footer class="text-center text-gray-500 text-sm pb-4">
  FR.ID.AI • Premium Audio Mixer Free Version
</footer>

  </div>
  <script>
    function loadYouTubeVideo() {
      const url = document.getElementById('youtubeUrl').value;
      let videoId = '';if (url.includes('watch?v=')) {
    videoId = url.split('watch?v=')[1].split('&')[0];
  } else if (url.includes('youtu.be/')) {
    videoId = url.split('youtu.be/')[1].split('?')[0];
  }

  if (videoId) {
    document.getElementById('youtubePlayer').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
  } else {
    alert('Link YouTube tidak valid');
  }
}

  </script>
  </div>
</body>
</html>
